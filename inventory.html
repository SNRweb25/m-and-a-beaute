<!DOCTYPE html>
<!--
  PAGE: Live Inventory (inventory.html)
  This page shows a live table of all soaps and their current stock levels.
  It automatically updates when a purchase is made on another tab —
  no page refresh needed.
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inventory · MnAbeaute</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body data-page="inventory">

  <header>
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">🌿</span>
        <div>
          <h1><span data-site-name>MnAbeaute</span></h1>
          <p class="tagline"><span data-site-tagline>Handcrafted Natural Soaps</span></p>
        </div>
      </div>

      <nav>
        <a href="index.html">Shop</a>
        <a href="inventory.html" class="active">Inventory</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="page-header">
      <div>
        <h2>Live Stock Inventory</h2>
        <p>Stock levels update automatically when a purchase is made.</p>
      </div>
      <!-- Pulsing green dot to signal that this page is live -->
      <span class="live-badge">&#9679; LIVE</span>
    </section>

    <!-- Inventory table — rows are generated by JavaScript -->
    <div class="inventory-table-wrap">
      <table class="inventory-table">
        <thead>
          <tr>
            <th>Soap</th>
            <th>Description</th>
            <th>Price</th>
            <th>In Stock</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="inventoryBody">
          <!-- JavaScript fills this in -->
        </tbody>
      </table>
    </div>
  </main>

  <footer>
    <p>© 2026 <span data-site-name>MnAbeaute</span> &middot; Made with 🌿 and love</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
